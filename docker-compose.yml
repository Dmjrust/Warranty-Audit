services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: warranty_postgres
    environment:
      POSTGRES_USER: warranty
      POSTGRES_PASSWORD: warranty_dev_pass
      POSTGRES_DB: warranty_audit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warranty -d warranty_audit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: warranty_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
