services:
  # ── API (NestJS) ──────────────────────────────────────────────────────────────
  # Web frontend is deployed on Vercel — only the API lives on Render.
  - type: web
    name: warranty-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: warranty-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: warranty-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: warranty-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: warranty-redis
          type: redis
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: API_PORT
        value: "4000"
      - key: OPENAI_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: warranty-evidence
      - key: R2_PUBLIC_URL
        sync: false

databases:
  - name: warranty-db
    databaseName: warranty_audit
    plan: starter

  - name: warranty-redis
    plan: starter
