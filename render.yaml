services:
  # ── API (NestJS) ──────────────────────────────────────────────────────────────
  - type: web
    name: warranty-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: Dockerfile
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: warranty-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: warranty-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: warranty-redis
          type: redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: API_PORT
        value: "4000"
      - key: OPENAI_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: warranty-evidence
      - key: R2_PUBLIC_URL
        sync: false

  # ── Web (Next.js) ─────────────────────────────────────────────────────────────
  - type: web
    name: warranty-web
    runtime: docker
    rootDir: apps/web
    dockerfilePath: Dockerfile
    plan: starter
    buildArgs:
      - key: NEXT_PUBLIC_API_URL
        value: https://warranty-api.onrender.com
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: API_URL
        value: https://warranty-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://warranty-api.onrender.com

databases:
  - name: warranty-db
    databaseName: warranty_audit
    plan: starter

  - name: warranty-redis
    plan: starter
